<html>

    <head>
        <link rel="stylesheet" href="assets/css/login.css">
        <script src="https://kit.fontawesome.com/7b3f30d431.js" crossorigin="anonymous"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
    </head>

    <body>
        <header class="header">

            <img src="img/logo.png" alt="Logo" class="logo">

            <nav>
                <div class="icons-menu">
                    <a href="#"><i class="fa-solid fa-house"></i></a>
                    <a href="#"><i class="fa-solid fa-circle-info"></i> </a>
                    <a href="#"><i class="fa-solid fa-address-card"></i></a>
                </div>
            </nav>

        </header>

        <main>
            <div class="login-box">

                <h2>Acesse sua conta</h2>

                <form>
                    <div class="input-group">
                        <i class="fa-regular fa-envelope icon-left"></i>
                        <input type="email" placeholder="Digite seu email" required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <input type="password" placeholder="Digite sua senha" required>

                    </div>

                    <button class="button" type="submit" class="btn btn-primary btn-lg">Entrar</button>
                </form>

                <div class="divider">
                    <span>ou continue com</span>
                </div>

                <div class="social-icons">
                    <i class="fa-brands fa-google"></i>
                    <i class="fa-brands fa-facebook"></i>
                </div>

                <div class="link-register">
                    <p>Não tem conta?<a href="#"> Realize seu cadastro</a></p>
                </div>

            </div>

        </main>

        <footer>

        </footer>

    </body>

</html>
