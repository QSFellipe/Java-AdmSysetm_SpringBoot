<html>
    <head>
        <link href="css/register.css" rel="stylesheet">
        <script src="https://kit.fontawesome.com/7b3f30d431.js" crossorigin="anonymous"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <header class="header">
            <img src="/img/logo.png" alt="Logo" class="logo">

            <nav>
                <div class="icons-menu">
                    <a href="#"><i class="fa-solid fa-house"></i></a>
                </div>
            </nav>

        </header>

        <main>
            <div class="login-box">

                <h2>Realize o seu cadastro</h2>

                <form>
                    <div class="input-group">
                        <i class="fa-regular fa-envelope icon-left"></i>
                        <input type="email" placeholder="Digite seu email" required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <input type="password" placeholder="Digite sua senha" required>
                    </div>

                    <div class="input-group">
                        <i class="fa-solid fa-lock icon-left"></i>
                        <input type="password" placeholder="Confirme sua senha" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">Criar conta</button>
                </form>

                <div class="divider">
                    <span>ou continue com</span>
                </div>

                <div class="social-icons">
                    <i class="fa-brands fa-google"></i>
                    <i class="fa-brands fa-facebook"></i>
                </div>

                <div class="link-register">
                    <p>Já possui uma conta?<a href="/login"> Login</a></p>
                </div>

            </div>
        </main>

        <footer>

        </footer>
    </body>

</html>
